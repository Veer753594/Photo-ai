<!DOCTYPE html>
<html>
<head>
  <title>AI Passport Photo Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>📸 Passport Photo Pro</h1>

  <input type="file" id="file">

  <select id="bg">
    <option value="white">White Background</option>
    <option value="blue">Blue Background</option>
  </select>

  <button onclick="upload()">✨ Generate Photo</button>

  <div id="status"></div>
  <div id="preview"></div>
</div>

<script src="script.js"></script>
</body>
</html>
